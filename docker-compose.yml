version: '3.8'

services:

  # ----------------------------------------
  # Application Service (Frontend + Backend)
  # ----------------------------------------
  gap-app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000" # Next.js Frontend
      - "4000:4000" # Express Backend API
    env_file:
      - ./backend/.env # Reads your existing backend/.env directly
    environment:
      - NODE_ENV=production
    restart: unless-stopped
